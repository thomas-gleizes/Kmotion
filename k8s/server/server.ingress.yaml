apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: server
  namespace: kmotion
spec:
  rules:
    - host: kmotion.thomasgleizes.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: server
                port:
                  number: 80
