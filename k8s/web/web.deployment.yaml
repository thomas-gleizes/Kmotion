apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: web
  name: web
  namespace: kmotion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
      name: web
    spec:
      containers:
        - image: ghcr.io/thomas-gleizes/kmotion-web:latest
          imagePullPolicy: Always
          name: web
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
