apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app: app
  name: app
  namespace: kmotion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
      name: app
    spec:
      initContainers:
        - name: migration
          image: ghcr.io/thomas-gleizes/kmotion:latest
          imagePullPolicy: Always
          command: ["node_modules/.bin/drizzle-kit", "migrate"]
          envFrom:
            - configMapRef:
                name: app
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
      containers:
      - envFrom:
        - configMapRef:
            name: app
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        image: ghcr.io/thomas-gleizes/kmotion:latest
        imagePullPolicy: Always
        name: app
        ports:
        - containerPort: 80
          protocol: TCP
      restartPolicy: Always
