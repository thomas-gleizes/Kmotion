apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app: app
  name: app
  namespace: kmotion
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
      name: app
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: migration
          image: ghcr.io/thomas-gleizes/kmotion:latest
          imagePullPolicy: Always
          command: ["node_modules/.bin/drizzle-kit", "migrate"]
          envFrom:
            - configMapRef:
                name: app
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
      containers:
      - envFrom:
        - configMapRef:
            name: app
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        image: ghcr.io/thomas-gleizes/kmotion:latest
        imagePullPolicy: Always
        name: app
        ports:
        - containerPort: 80
          protocol: TCP
        startupProbe:
          httpGet:
            path: /api/3.1/health
            port: 80
          periodSeconds: 3
          failureThreshold: 20
        readinessProbe:
          httpGet:
            path: /api/3.1/health
            port: 80
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/3.1/health
            port: 80
          periodSeconds: 10
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            memory: "512Mi"
      restartPolicy: Always
