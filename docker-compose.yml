version: '3.7'

services:
  db:
    build:
      context: .
      dockerfile: db.Dockerfile
    container_name: kmotion_db_container
    restart: always
    volumes:
      - kmotion-db:/var/lib/mysql
    ports:
      - 3001:3306
  app:
    build:
      context: .
      dockerfile: app.Dockerfile
    container_name: kmotion_app_container
    restart: always
    ports:
      - 8080:80
    depends_on:
      - db

volumes:
  kmotion-db:
