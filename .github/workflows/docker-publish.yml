name: Build & Push Docker Image

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - "**"

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.16.0

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate

      - name: Install dependencies
        working-directory: ./apps/server
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: ./apps/server
        run: pnpm test

  build-and-push:
    name: Build and Push ${{ matrix.name }} to GHCR
    runs-on: ubuntu-latest
    needs: test
#    container:
#      image: ubuntu:latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: server
            image: ${{ github.repository }}
            context: ./apps/server
            dockerfile: ./apps/server/Dockerfile
          # Web image is built from the repo root so its Dockerfile can also
          # build the browser extension and bundle it as a static download.
          - name: web
            image: ${{ github.repository }}-web
            context: .
            dockerfile: ./apps/web/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/master' }}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Restart deployments on cluster
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'

    steps:
      # Kubeconfig à droits réduits (rollout de Deployments uniquement),
      # généré par cluster-config/rollout-access. base64 stocké dans le secret.
      - name: Set up kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.ROLLOUT_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/app -n kmotion
          kubectl rollout restart deployment/web -n kmotion
          kubectl rollout status deployment/app -n kmotion --timeout=120s
          kubectl rollout status deployment/web -n kmotion --timeout=120s
